name: Documentation CI

on:
  push:
    paths:
      - 'client/**'
      - 'server/**'
      - '.github/workflows/docs.yml'

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install client dependencies
        working-directory: ./client
        run: yarn install --frozen-lockfile

      - name: Generate client docs
        working-directory: ./client
        run: npx typedoc --tsconfig tsconfig.app.json --entryPointStrategy expand --entryPoints src --out ../docs-artifacts/client

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Generate server docs
        working-directory: ./server
        run: npx typedoc --skipErrorChecking --tsconfig tsconfig.json --entryPointStrategy expand --entryPoints src --out ../docs-artifacts/server

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-docs-${{ github.ref_name }}-${{ github.sha }}
          path: docs-artifacts
