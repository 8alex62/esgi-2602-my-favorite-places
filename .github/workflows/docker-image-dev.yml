name: Docker Images CI dev

on:
  push:
    branches: [ "dev" ]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      server: ${{ steps.filter.outputs.server }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            client:
              - 'client/**'
            server:
              - 'server/**'
            ci:
              - '.github/workflows/**'

  build-client:
    needs: changes
    if: needs.changes.outputs.client == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}-client-dev
          tags: |
            type=raw,value=dev
            type=sha,prefix=sha-

      - name: Build and push client
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-server:
    needs: changes
    if: needs.changes.outputs.server == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}-server-dev
          tags: |
            type=raw,value=dev
            type=sha,prefix=sha-

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  generate-docs:
    needs: changes
    if: needs.changes.outputs.client == 'true' || needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install client dependencies
        working-directory: ./client
        run: yarn install --frozen-lockfile

      - name: Generate client docs
        working-directory: ./client
        run: npx typedoc --tsconfig tsconfig.app.json --entryPointStrategy expand --entryPoints src --out ../docs-artifacts/client

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Generate server docs
        working-directory: ./server
        run: npx typedoc --tsconfig tsconfig.json --entryPointStrategy expand --entryPoints src --out ../docs-artifacts/server

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-docs
          path: docs-artifacts